version: 2

models:
  - name: fct_orders
    description: "Core fact table. One row per order, enriched with customer and product context. Use this table for revenue and order volume analysis."
    columns:
      - name: ORDER_ID
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: CUSTOMER_ID
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: CUSTOMER_ID
      - name: PRODUCT_ID
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: PRODUCT_ID
      - name: REVENUE
        description: "Order revenue calculated as quantity multiplied by unit price, rounded to two decimals."
        tests:
          - not_null

  - name: dim_customers
    description: "Customer dimension enriched with order history. Use this table for customer-level analysis including lifetime value and order frequency."
    columns:
      - name: CUSTOMER_ID
        description: "Unique identifier for each customer. Primary key."
        tests:
          - unique
          - not_null
      - name: SEGMENT
        description: "Customer segment. One of: Basic, Premium, or Enterprise."
        tests:
          - accepted_values:
              values: ['consumer', 'corporate', 'small_business']
      - name: CUSTOMER_LIFETIME_VALUE
        description: "Total revenue generated by this customer across all orders."
        tests:
          - not_null
      - name: TOTAL_ORDERS
        description: "Total number of orders placed by this customer."
        tests:
          - not_null

  - name: dim_products
    description: "Product dimension. One row per product. Use this table for product and category analysis."
    columns:
      - name: PRODUCT_ID
        description: "Unique identifier for each product. Primary key."
        tests:
          - unique
          - not_null